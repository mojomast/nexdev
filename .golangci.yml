run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - govet
    - ineffassign
    - gofmt

linters-settings:
  gofmt:
    simplify: true

issues:
  exclude-rules:
    # Exclude property test files from some checks
    - path: test/properties/
      linters:
        - govet
  
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
